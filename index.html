<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Nancy Jasmina Barbelo – Therapeutin, Coach und spirituelle Begleiterin">
  <title>Barbelo – Neural Consciousness</title>
  <link rel="stylesheet" href="design-system.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    /* ===== INDEX-ONLY STYLES (Hero) ===== */
    .hero {
      text-align: center;
      padding: 40px 0 60px;
    }
    .hero h1 {
      font-size: clamp(36px, 6vw, 64px);
      line-height: 1.15;
      letter-spacing: 3px;
      margin-bottom: 16px;
    }
    .hero .tagline {
      font-family: var(--font-display);
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      font-size: clamp(13px, 1.4vw, 16px);
      margin-bottom: 0;
    }

    #lightning-flash {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.9);
      pointer-events: none;
      z-index: 9999;
      opacity: 0;
    }
    @keyframes lightning-flash {
      0%   { opacity: 0; }
      5%   { opacity: 1; }
      10%  { opacity: 0; }
      15%  { opacity: 0.9; }
      20%  { opacity: 0; }
      25%  { opacity: 0.7; }
      35%  { opacity: 0; }
      100% { opacity: 0; }
    }
    #lightning-flash.active {
      animation: lightning-flash 0.6s ease-out 1;
    }
  </style>
</head>
<body>
  <canvas id="neural-canvas"></canvas>
  <div id="lightning-flash"></div>

  <header>
    <a href="index.html" class="logo">⦗ BARBEL<span class="sun-pulse">O</span> ⦘</a>

    <a href="pages/ueber-mich.html">Über mich</a>
  </nav>

  <main id="stage">
    <section class="hero">
      <h1>Neural<br>Consciousness</h1>
      <p class="tagline">Von Verletzungen zu Vernetzungen</p>
    </section>
  </main>

  <footer>
    <nav>
      <a href="pages/impressum.html">Impressum</a>
      <a href="pages/datenschutz.html">Datenschutz</a>
    </nav>
    <p>© 2026 Nancy Jasmina Barbelo · insleben.com</p>
  </footer>

  <script src="neural-bg.js"></script>
  <script>
    // Easter Egg: 5× auf das Logo klicken für Blitz + Farben ⚡
    document.addEventListener('DOMContentLoaded', () => {
      const logo = document.querySelector('.logo');
      const flashEl = document.getElementById('lightning-flash');
      let clickCount = 0;

      function thunder() {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const now = ctx.currentTime;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.setValueAtTime(80, now);
          osc.frequency.exponentialRampToValueAtTime(20, now + 0.2);
          gain.gain.setValueAtTime(0.3, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
          osc.start(now);
          osc.stop(now + 0.3);
        } catch (e) {}
      }

      logo.addEventListener('click', e => {
        e.preventDefault();
        flashEl.classList.remove('active');
        void flashEl.offsetWidth;
        flashEl.classList.add('active');
        setTimeout(() => flashEl.classList.remove('active'), 600);

        thunder();

        document.body.style.filter = `hue-rotate(${Math.random() * 360}deg)`;
        setTimeout(() => document.body.style.filter = '', 500);

        clickCount++;
        if (clickCount === 5) {
          alert('🎆 Du hast das geheime Ritual aktiviert! Die Website wird noch magischer... 🌙');
          clickCount = 0;
        }
      });
    });
  </script>
</body>
